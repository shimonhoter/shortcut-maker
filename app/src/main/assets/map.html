<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
#map { width:100%; height:100%; }
#pin-hint {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.65); color:#fff;
  padding:6px 14px; border-radius:20px; font-size:13px;
  z-index:1000; pointer-events:none; white-space:nowrap;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="pin-hint">לחץ על המפה לבחירת נקודה</div>
<script>
var map = L.map('map', { zoomControl: true }).setView([31.7683, 35.2137], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19,
  subdomains: ['a','b','c']
}).addTo(map);

var marker = null;
var hint = document.getElementById('pin-hint');

map.on('click', function(e) {
  var lat = e.latlng.lat.toFixed(6);
  var lng = e.latlng.lng.toFixed(6);
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map)
    .bindPopup('📍 ' + lat + ', ' + lng).openPopup();
  hint.textContent = '📍 ' + lat + ', ' + lng;
  Android.onPick(parseFloat(lat), parseFloat(lng), lat + ', ' + lng);
});

function jumpTo(lat, lng, label) {
  map.setView([lat, lng], 15);
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map)
    .bindPopup('📍 ' + label).openPopup();
  hint.textContent = '📍 ' + label;
  Android.onPick(lat, lng, label);
}
</script>
</body>
</html>
